name: chama_app
description: A Flutter Chama (group savings) mobile app connected to the same Supabase database as the web app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.6

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Supabase
  supabase_flutter: ^2.5.0

  # Routing
  go_router: ^14.2.0

  # Form Handling
  flutter_form_builder: ^9.2.1
  form_builder_validators: ^10.0.1

  # Data Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Dependency Injection
  get_it: ^7.6.7

  # Utils
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/